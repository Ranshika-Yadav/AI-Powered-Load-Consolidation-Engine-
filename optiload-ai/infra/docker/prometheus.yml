global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8001']
    metrics_path: '/metrics'

  - job_name: 'ingestion-service'
    static_configs:
      - targets: ['ingestion-service:8002']
    metrics_path: '/metrics'

  - job_name: 'clustering-service'
    static_configs:
      - targets: ['clustering-service:8003']
    metrics_path: '/metrics'

  - job_name: 'optimization-service'
    static_configs:
      - targets: ['optimization-service:8004']
    metrics_path: '/metrics'

  - job_name: 'simulation-service'
    static_configs:
      - targets: ['simulation-service:8005']
    metrics_path: '/metrics'

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:8006']
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
